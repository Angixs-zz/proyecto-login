<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <div>
        <img src="./img/hola.png" alt="cvhjg">
        <h1>Iniciar Sesion</h1>
        <h3>Plataforma Estudiantil</h3>
        <form>
            <div>
                <label>Correo Electronico</label>
                <input
                    type="text"
                    id="correoElectronico"
                    name="correoElectronico"
                    placeholder="amiguitos@amistad.com">
            </div>
            <div>
                <label>Contraseña</label>
                <input
                    type="text"
                    id="password"
                    name="password"
                    placeholder="*******">
            </div>

            <button
                type="button"
                id="botonLogin"
                name="botonLogin"
                > Iniciar Sesion
            </button>
        </form>
    </div>
</body>
</html>
