<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Plataforma Estudiantil</title>

    <!-- Librería Externa: Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Archivo CSS Personalizado (Donde está tu lógica de colores y detalles) -->
    <link rel="stylesheet" href="./css/login.css">
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">

    <!-- Utilizamos las clases de Bootstrap para la estructura y responsividad, y las nuestras para el diseño -->
    <div class="container login-container p-4 p-md-5">

        <div class="text-center mb-4">
            <img src="./img/logo.png" alt="Logo" class="login-image">
        </div>

        <h1 class="h3 text-center mb-4 login-title fw-bold">Iniciar Sesión</h1>

        <form>
            <div class="mb-3">
                <label for="correoElectronico" class="form-label login-label">Correo Electrónico</label>
                <input type="email" class="form-control form-control-lg login-input" id="correoElectronico"
                    name="correoElectronico" placeholder="amiguitos@amistad.com" required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label login-label">Contraseña</label>
                <input type="password" class="form-control form-control-lg login-input" id="password" name="password"
                    placeholder="•••••••" required>
            </div>

            <div class="d-grid mt-4">
                <button type="button" class="btn btn-lg login-btn fw-bold" id="botonLogin" name="botonLogin">
                    Entrar
                </button>
            </div>
        </form>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
