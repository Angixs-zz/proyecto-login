<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/index.css">
</head>

<body>

    <header class="navbar-custom text-white p-3 d-flex justify-content-between align-items-center shadow-sm">
        <div class="d-flex align-items-center gap-3">
            <button id="menu-despegable" class="btn btn-outline-light fw-bold">☰ Menú</button>
            <h5 class="m-0 fw-bold d-none d-sm-block">Plataforma Estudiantil</h5>
        </div>

        <nav class="navbar-derecha">
            <details id="para-salir" class="position-relative">
                <summary class="fw-bold" style="list-style: none; cursor: pointer; user-select: none;">
                    <span id="nomusuario">Nombre de Usuario</span> ▼
                </summary>

                <ul id="menuSalir" class="position-absolute end-0 mt-2 bg-white rounded shadow p-2 list-unstyled"
                    style="min-width: 160px; z-index: 1000;">
                    <li><a href="login.html" id="btnSalir"
                            class="text-decoration-none text-danger fw-bold d-block px-2 py-1">Salir del sistema</a>
                    </li>
                </ul>
            </details>
        </nav>
    </header>

    <main class="contenedor-principal">

        <aside id="menulateral" class="p-3 shadow-sm">
            <div class="text-center mb-4 mt-2">
                <img src="./img/logo.png" alt="Logo" style="width: 80px;">
            </div>

            <ul class="list-unstyled">
                <li>
                    <button id="btnInicio" class="btn btn-light w-100 text-start fw-bold mb-2 shadow-sm">
                        Inicio
                    </button>
                </li>




                <li>
                    <button id="btnMenuUsuarios" class="btn btn-light w-100 text-start fw-bold mb-2 shadow-sm">Usuarios
                        ▼</button>
                    <ul id="submenuCaptura" class="list-unstyled ms-3">
                        <li><a href="#" id="enlaceCaptura"
                                class="text-decoration-none text-primary fw-bold p-2 d-block">Captura</a></li>
                    </ul>
                </li>
            </ul>
        </aside>

        <section class="contenido-central bg-light">

            <div class="seccion-bienvenida text-center mt-5" id="pantallaBienvenida">
                <h1 class="titulo-sistema">¡Bienvenido al Sistema!</h1>
                <p class="text-secondary fs-5 mt-3">Por favor, selecciona una opción del menú lateral para comenzar.</p>
                <button id="btnTour" class="btn btn-lg btn-outline-success mt-4 fw-bold shadow-sm" style="border-radius: 30px; border-width: 2px;">
                    🗺️ Iniciar Guía Interactiva
                </button>
            </div>

            <div class="tarjeta-formulario" id="seccionFormulario">
                <h2 class="titulo-sistema text-center mb-1">Captura de Usuario</h2>
                <p class="text-secondary text-center mb-4">Completa los datos del alumno</p>

                <form class="formulario" onsubmit="return false;">
                    <div class="mb-3">
                        <label for="nombre" class="form-label fw-bold">Nombre Completo</label>
                        <input type="text" id="nombre" class="form-control form-control-lg" style="border-radius: 15px;"
                            placeholder="Ej. Juan Pérez">
                        <div id="errorNombreCaptura" class="text-danger small mt-1 fw-bold"></div>
                    </div>

                    <div class="mb-3">
                        <label for="correo" class="form-label fw-bold">Correo Electrónico</label>
                        <input type="email" id="correo" class="form-control form-control-lg"
                            style="border-radius: 15px;" placeholder="ejemplo@correo.com">
                        <div id="errorCorreoCaptura" class="text-danger small mt-1 fw-bold"></div>
                    </div>

                    <div class="mb-3">
                        <label for="numcontrol" class="form-label fw-bold">Número de control (Máximo 6 dígitos)</label>
                        <input type="number" id="numcontrol" class="form-control form-control-lg"
                            style="border-radius: 15px;" placeholder="Ej. 123456">
                        <div id="errorNumControl" class="text-danger small mt-1 fw-bold"></div>
                    </div>

                    <div class="mb-3">
                        <label for="curp" class="form-label fw-bold">CURP</label>
                        <input type="text" id="curp" class="form-control form-control-lg"
                            style="border-radius: 15px; text-transform: uppercase;"
                            placeholder="Ej. PAAA000000HDFXXXXX0">
                        <div id="errorCurp" class="text-danger small mt-1 fw-bold"></div>
                    </div>

                    <div class="mb-3">
                        <label for="telefono" class="form-label fw-bold">Número Telefónico</label>
                        <input type="tel" id="telefono" class="form-control form-control-lg"
                            style="border-radius: 15px;" placeholder="Ej. 9511234567">
                        <div id="errorTelefono" class="text-danger small mt-1 fw-bold"></div>
                    </div>

                    <div class="mb-3">
                        <label for="Contraseña" class="form-label fw-bold">Contraseña</label>
                        <input type="password" id="Contraseña" class="form-control form-control-lg"
                            style="border-radius: 15px;" placeholder="Mínimo 8 caracteres">
                        <div id="errorPasswordCaptura" class="text-danger small mt-1 fw-bold"></div>
                    </div>

                    <div class="mb-4">
                        <label for="fechaNac" class="form-label fw-bold">Fecha de Nacimiento</label>
                        <input type="date" id="fechaNac" class="form-control form-control-lg"
                            style="border-radius: 15px;">
                        <div id="errorFechaNacCaptura" class="text-danger small mt-1 fw-bold"></div>
                    </div>


                    <div class="d-grid mt-4">
                        <button type="submit" id="btnGuardar" class="btn btn-lg btn-personalizado fw-bold">Registrar
                            Alumno</button>
                    </div>
                </form>
            </div>

        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utileria.js"></script>
    <script src="js/guiaExplorador.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/captura.js"></script>


</body>

</html>
