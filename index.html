<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Usuario</title>




    <style>
    
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        
        header {
            width: 100%;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            padding: 10px 20px;
            background-color: #f0f0f0; 
            border-bottom: 1px solid #ccc;
        }
        .navbar-derecha {
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }
        
        details {
            cursor: pointer;
        }
        details summary {
            list-style: none; 
        }
        #menuSalir {
            position: absolute;
            right: 0;
            top: 25px;
            background: white;
            border: 1px solid #ccc;
            list-style: none;
            padding: 5px 10px;
            white-space: nowrap;
            z-index: 10;
        }

        .contenedor-principal {
            display: flex;
            flex: 1; 
            width: 100%;
        }

        #sidebar {
            width: 250px;
            background-color: #e8e8e8; 
            padding: 20px;
            border-right: 1px solid #ccc;
        }
        #sidebar ul {
            list-style: none;
            margin-top: 15px;
        }
        
        #submenuCaptura {
            display: none; 
            padding-left: 15px;
            margin-top: 5px;
        }
        #submenuCaptura a {
            text-decoration: none;
            color: blue;
        }

       
        .contenido-central {
            flex: 1; 
            padding: 40px;
            display: flex;
            justify-content: center; 
            align-items: flex-start;
        }
        
        .seccion-bienvenida {
            text-align: center;
            margin-top: 50px;
        }
        
        .contenedor-formulario {
            display: none; 
            width: 100%;
            max-width: 500px; 
        }
        
        .grupo-formulario {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column; 
            gap: 5px;
        }
    </style>
</head>


<body>
    
    <header>
        
        <button id="menu-despegable">☰ Menú</button>
     
       <! nav: se utiliza para envolver el menú de navegación o los enlaces principales de un sitio web.  -->
        <nav class="navbar-derecha">

        <! details: sirve para crear un elemento interactivo que el usuario puede abrir o cerrar dando un clic. -->
                <details id="para-salir">
                
                <!summary:  Es la frase o elemento sobre el cual la persona tiene que hacer clic para que lo que está oculto abajo se muestre-->
                <summary>

                    <!span: sirve como un contenedor en línea-->
                    <span id="nomusuario">Nombre de Usuario</span> ▼
              
                </summary>

                    <!ul: agrupar un conjunto de elementos que están relacionados entre sí,-->
                <ul id="menuSalir">

                    <!Para meter cada uno de los elementos de la lista,-->
                    <li><a href="login.html" id="btnSalir">Salir del sistema</a></li>
                </ul>

            </details>
        </nav>
    </header>


    <!contenido principal -->
    <main class="contenedor-principal">

        <!aside: marca contenido que está relacionadamente de forma secundaria con el contenido principal de la página-->
        <aside id="menulateral">

            <h2>Mi Sistema</h2>
            
            <ul>
                <li>
                    <button id="btnMenuUsuarios">Usuarios ▼</button>
                    <ul id="submenuCaptura">
                        <!href="#": que sirve para crear un enlace que apunte a la misma página en la que ya estás parado-->
                        <li><a href="#" id="enlaceCaptura">Captura</a></li>
                    </ul>
                </li>
            </ul>
        </aside>


        <section class="contenido-central">
            
            <div class="seccion-bienvenida" id="pantallaBienvenida">
                <h1>¡Bienvenido al Sistema!</h1>
                <p>Por favor, selecciona una opción del menú lateral para comenzar.</p>
            </div>

            
            <div class="contenedor-formulario" id="seccionFormulario">
                <h1>Captura de Usuario</h1>
                <p class="subtitulo">Completa los datos que se solicitan</p>

                <form class="formulario" onsubmit="return false;">
                    <div class="grupo-formulario">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Ej. Juan Pérez">
                    </div>

                    <div class="grupo-formulario">
                        <label for="correo">Correo Electrónico</label>
                        <input type="text" id="correo" placeholder="ejemplo@correo.com">
                    </div>
        
                    <div class="grupo-formulario">
                        <label for="numcontrol">Ingresa tu número de control (Máximo 6 dígitos)</label>
                        <input type="number" id="numcontrol" placeholder="Ej. 123456">
                    </div>

                    <div class="grupo-formulario">
                        <label for="Contraseña">Contraseña</label>
                        <input type="password" id="Contraseña" placeholder="Mínimo 8 caracteres, mayúscula, número y símbolo">
                    </div>

                    <div class="grupo-formulario">
                        <label for="fechaNac">Fecha de Nacimiento</label>
                        <input type="date" id="fechaNac">
                    </div>

                    <button type="submit" id="btnGuardar">Registrar Alumno</button>
                </form>
            </div>
        </section>

    </main>

    <script src="js/menu.js"></script>

</body>
</html>
